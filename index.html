<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
--bg:#f8f7ff;--card:#ffffff;--border:#e4e2f0;
--accent:#6c63ff;--accent2:#9d97ff;--accent-bg:#f0efff;
--text:#1a1730;--text2:#5c5880;--text3:#9895b0;
--verse-bg:#f3f0ff;--verse-border:#6c63ff;
--pill-bg:#ece9ff;--pill-text:#4a43c7;
--prayer-bg:#f8f7ff;--prayer-border:#d4d0f5;
--progress-active:#6c63ff;--progress-done:#b8b4f5;
--footer-bg:#f0efff;
}
.dm{
--bg:#0f0e1a;--card:#18162a;--border:#2e2b4a;
--accent:#8b84ff;--accent2:#b0aaff;--accent-bg:#1e1c38;
--text:#edeaff;--text2:#a09bc8;--text3:#6a6490;
--verse-bg:#1a1830;--verse-border:#8b84ff;
--pill-bg:#2a2845;--pill-text:#c5c0ff;
--prayer-bg:#1a1830;--prayer-border:#2e2b4a;
--progress-active:#8b84ff;--progress-done:#3d3870;
--footer-bg:#13112200;
}
body{background:transparent;font-family:'Segoe UI',system-ui,sans-serif}
#app{background:var(--bg);border-radius:18px;border:0.5px solid var(--border);overflow:hidden;transition:background .3s,color .3s;max-width:500px;margin:auto}
@media(max-width:500px){#app{border-radius:0;border:none}}

.hdr{background:var(--card);border-bottom:0.5px solid var(--border);padding:14px 20px;display:flex;align-items:center;justify-content:space-between}
.hdr-l{display:flex;align-items:center;gap:10px}
.logo{width:38px;height:38px;background:var(--accent);border-radius:12px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:19px}
.hdr-title{font-size:15px;font-weight:600;color:var(--text);letter-spacing:-.01em}
.hdr-sub{font-size:11px;color:var(--text3);margin-top:1px}
.hdr-r{display:flex;gap:6px}
.ibtn{width:34px;height:34px;border-radius:9px;border:0.5px solid var(--border);background:var(--card);color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:background .15s,color .15s}
.ibtn:hover{background:var(--accent-bg);color:var(--accent)}

.prog-wrap{background:var(--card);padding:10px 20px 12px;border-bottom:0.5px solid var(--border)}
.prog-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.day-lbl{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.07em}
.dots{display:flex;gap:6px;align-items:center;justify-content:center}
.dot{width:7px;height:7px;border-radius:50%;background:var(--border);cursor:pointer;transition:background .25s,width .25s,border-radius .25s}
.dot.active{width:28px;border-radius:4px;background:var(--progress-active)}
.dot.done{background:var(--progress-done)}

.top-audio-btn{border:none;background:var(--pill-bg);color:var(--pill-text);padding:4px 10px;border-radius:6px;font-size:11px;font-weight:700;display:flex;align-items:center;gap:4px;cursor:pointer}

.main{padding:22px 22px 10px;animation:fs .35s ease}
@keyframes fs{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

.pill{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;background:var(--pill-bg);color:var(--pill-text);border-radius:20px;padding:3px 11px;margin-bottom:11px;letter-spacing:.04em;text-transform:uppercase}
.pill i{font-size:13px}
.day-title{font-size:21px;font-weight:700;color:var(--text);letter-spacing:-.02em;margin-bottom:14px;line-height:1.25}

.audio-row{display:flex;align-items:center;gap:10px;background:var(--card);border:0.5px solid var(--border);border-radius:12px;padding:10px 12px;margin-bottom:14px}
.audio-controls{display:flex;gap:5px}
.play-btn, .stop-btn{width:34px;height:34px;border-radius:50%;border:none;display:flex;align-items:center;justify-content:center;font-size:14px;cursor:pointer;transition:all .15s}
.play-btn{background:var(--accent);color:#fff}
.stop-btn{background:var(--border);color:var(--text2)}
.play-btn:hover{background:var(--accent2)}
.a-info{flex:1;min-width:0}
.a-name{font-size:11px;font-weight:600;color:var(--text);margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.a-track{width:100%;height:3px;background:var(--border);border-radius:2px;overflow:hidden}
.a-fill{height:100%;background:var(--accent);width:0%;transition:width .4s}
.a-time{font-size:10px;color:var(--text3);text-align:right;margin-top:3px}

.verse-block{background:var(--verse-bg);border-left:3px solid var(--verse-border);border-radius:0 10px 10px 0;padding:13px 15px;margin-bottom:16px;display:flex;gap:10px}
.verse-block i{color:var(--accent);font-size:18px;margin-top:2px;flex-shrink:0}
.verse-ref{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--accent);margin-bottom:4px}
.verse-txt{font-family:Georgia,serif;font-style:italic;font-size:14px;color:var(--text);line-height:1.65}

.sec{margin-bottom:13px}
.sec-lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);display:flex;align-items:center;gap:5px;margin-bottom:5px}
.sec-lbl i{font-size:14px;color:var(--accent)}
.sec p{font-size:14px;color:var(--text2);line-height:1.7}

.prayer{background:var(--prayer-bg);border:0.5px solid var(--prayer-border);border-radius:10px;padding:13px 15px;font-family:Georgia,serif;font-style:italic;font-size:14px;color:var(--text2);line-height:1.7}

.foot{padding:12px 20px 14px;border-top:0.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:8px;background:var(--card)}
.nav-btn{display:inline-flex;align-items:center;gap:5px;padding:8px 16px;border-radius:9px;border:0.5px solid var(--border);background:var(--card);color:var(--text2);font-size:13px;font-weight:500;cursor:pointer;transition:background .15s,color .15s,border-color .15s}
.nav-btn:hover{background:var(--accent-bg);color:var(--accent);border-color:var(--accent2)}
.nav-btn.pri{background:var(--accent);border-color:var(--accent);color:#fff}
.nav-btn.pri:hover{background:var(--accent2);border-color:var(--accent2)}
.nav-btn:disabled{opacity:.35;pointer-events:none}

.site-footer{text-align:center;padding:10px 20px 14px;background:var(--footer-bg)}
.site-footer span{font-size:11px;color:var(--text3)}
.site-footer i{font-size:12px;vertical-align:-1px;color:var(--accent)}
.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)}
</style>

<div id="app">
<div class="hdr">
  <div class="hdr-l">
    <div class="logo"><i class="ti ti-book"></i></div>
    <div>
      <div class="hdr-title">Devocionais Diários</div>
      <div class="hdr-sub">Uma inspiração para seu dia</div>
    </div>
  </div>
  <div class="hdr-r">
    <button class="ibtn" id="dmBtn"><i class="ti ti-moon" id="dmIco"></i></button>
    <button class="ibtn" onclick="doShare()"><i class="ti ti-brand-whatsapp"></i></button>
    <button class="ibtn" onclick="window.print()"><i class="ti ti-printer"></i></button>
  </div>
</div>

<div class="prog-wrap">
  <div class="prog-hdr">
    <div class="day-lbl" id="dayLbl">Dia 1 de 5</div>
    <button class="top-audio-btn" onclick="handleAudio()"><i class="ti ti-headphones" id="topAudIco"></i> <span id="topAudTxt">OUVIR</span></button>
  </div>
  <div class="dots" id="dots"></div>
</div>

<div id="main" class="main"></div>

<div class="foot">
  <button class="nav-btn" id="prevB" onclick="prev()"><i class="ti ti-chevron-left"></i> Anterior</button>
  <button class="nav-btn pri" id="nextB" onclick="next()">Próximo <i class="ti ti-chevron-right"></i></button>
</div>

<div class="site-footer">
  <span><i class="ti ti-code"></i> Desenvolvido por Alex Silva &mdash; 2026</span>
</div>
</div>

<script>
const devs=[
{dia:1,titulo:"O Senhor está perto",ref:"Salmos 34:18",verso:"O Senhor está perto dos que têm o coração quebrantado e salva os de espírito abatido.",reflexao:"A proximidade de Deus não depende das nossas circunstâncias — ela é uma realidade que precede nosso sofrimento. Antes mesmo de sentirmos a dor, Ele já Se inclina sobre nós. A Escritura não promete ausência de tribulação, mas algo mais profundo: a presença daquele que sustenta, mesmo quando tudo ao redor desmorona.",aplicacao:"Escreva três momentos em que você percebeu o cuidado de Deus mesmo em meio às dificuldades. Leia-os em voz alta como ato de fé, reconhecendo Sua fidelidade contínua.",oracao:"Senhor, que Se aproximas dos corações partidos, consola-me com Tua presença que excede toda compreensão. Que eu encontre, na fraqueza, a certeza inabalável do Teu amor. Amém."},
{dia:2,titulo:"Esperança no deserto",ref:"Isaías 43:19",verso:"Eis que faço coisa nova; já está brotando; não a percebeis vós? Eis que porei um caminho no deserto e rios no ermo.",reflexao:"Deus não é reativo — Ele age antes que possamos ver o resultado. Quando o profeta anunciou a novidade, o povo ainda vivia o exílio. A esperança bíblica não é otimismo ingênuo; é certeza ancorada no caráter de um Deus que abre caminhos onde não há e faz brotar vida onde só havia árido silêncio.",aplicacao:"Escreva uma área da sua vida onde você deseja ver renovação. Entregue-a em oração, confiando que Deus já está agindo mesmo antes de você enxergar.",oracao:"Senhor do impossível, abre novos caminhos diante de mim e renova minha esperança. Que meus olhos percebam Tua ação mesmo onde tudo parece sem saída. Amém."},
{dia:3,titulo:"Paz em meio à ansiedade",ref:"Filipenses 4:6-7",verso:"Não andeis ansiosos de coisa alguma; em tudo, porém, sejam conhecidas diante de Deus as vossas petições, pela oração e pela súplica, com ações de graças.",reflexao:"Paulo escreveu essas palavras de dentro de uma prisão — não de um retiro espiritual tranquilo. A paz que ele descreve não é produto de boas circunstâncias; é fruto do diálogo real com um Deus pessoal que ouve, age e sustenta. A oração não é técnica de relaxamento: é o canal pelo qual a presença de Deus guarda o que não conseguimos proteger.",aplicacao:"Faça uma lista das suas preocupações. Para cada uma, ore especificamente e encerre com uma ação de graças. Perceba como a gratidão reorienta o olhar.",oracao:"Pai fiel, tomo minhas ansiedades e as coloco nas Tvossas mãos. Enche-me com a paz que excede todo entendimento e guarda meu coração em Cristo Jesus. Amém."},
{dia:4,titulo:"Força na fraqueza",ref:"2 Coríntios 12:9",verso:"A minha graça te basta, porque o meu poder se aperfeiçoa na fraqueza.",reflexao:"Há uma inversão profunda na lógica do Reino: é exatamente onde terminamos que Deus começa. Paulo pediu a remoção do que o afligia — a resposta que recebeu não foi eliminação, mas transformação. A fraqueza reconhecida não é derrota; é o espaço onde o poder de Deus encontra seu terreno mais fértil.",aplicacao:"Reconheça uma área de fraqueza pessoal. Em vez de a esconder, apresente-a a Deus como espaço para Sua glória. Ore pedindo que Ele opere onde você não pode.",oracao:"Senhor, que Tua graça suficiente seja minha força hoje. Que em minha limitação confessada, Teu poder se manifeste de maneiras que só a Ti glorificam. Amém."},
{dia:5,titulo:"Alegria que vem do alto",ref:"Neemias 8:10",verso:"A alegria do Senhor é a vossa força.",reflexao:"Neemias falou isso num dia de lágrimas — o povo ouvia a Lei e chorava por suas falhas. A alegria bíblica não é superficial nem nega a dor; ela a transcende. É fundada não em momentos favoráveis, mas no caráter imutável de um Deus fiel. Por isso ela sustenta quando as emoções não sustentam, e persiste quando as circunstâncias desaparecem.",aplicacao:"Escolha uma atividade que lhe traga genuína alegria e faça-a como expressão de gratidão a Deus. Anote como a presença Dele permeia os momentos simples e belos da vida.",oracao:"Senhor eterno, enche meu coração de alegria verdadeira — não a do mundo que passa, mas a profunda e inabalável que nasce de conhecer-Te e ser por Ti amado. Amém."}
];

let cur=0,dark=false,audPlay=false,audProg=0,audMax=120,audItv=null,showAud=false;
const synth=window.speechSynthesis;

function fmt(s){const m=Math.floor(s/60),sc=Math.floor(s%60);return m+':'+(sc<10?'0':'')+sc}

function render(){
  const d=devs[cur];
  document.getElementById('dayLbl').textContent='Dia '+(cur+1)+' de '+devs.length;
  const dotsEl=document.getElementById('dots');
  dotsEl.innerHTML='';
  devs.forEach((_,i)=>{
    const dot=document.createElement('div');
    dot.className='dot'+(i===cur?' active':i<cur?' done':'');
    dot.onclick=()=>{cur=i;stopAudio();render()};
    dotsEl.appendChild(dot);
  });
  document.getElementById('prevB').disabled=cur===0;
  document.getElementById('nextB').disabled=cur===devs.length-1;

  const audBlock=showAud?`<div class="audio-row"><div class="audio-controls"><button class="play-btn" onclick="togglePlay()"><i class="ti ti-player-${audPlay?'pause':'play'}" id="playIco"></i></button><button class="stop-btn" onclick="stopAudio()"><i class="ti ti-x"></i></button></div><div class="a-info"><div class="a-name">${d.titulo}</div><div class="a-track"><div class="a-fill" id="aFill"></div></div><div class="a-time" id="aTime">0:00 / ${fmt(audMax)}</div></div></div>`:'';

  document.getElementById('main').innerHTML=`
<div class="pill"><i class="ti ti-sun-high"></i> Inspiração do dia</div>
<div class="day-title">${d.titulo}</div>
${audBlock}
<div class="verse-block"><i class="ti ti-quote"></i><div><div class="verse-ref">${d.ref}</div><div class="verse-txt">${d.verso}</div></div></div>
<div class="sec"><div class="sec-lbl"><i class="ti ti-eye"></i> Reflexão</div><p>${d.reflexao}</p></div>
<div class="sec"><div class="sec-lbl"><i class="ti ti-pencil"></i> Aplicação</div><p>${d.aplicacao}</p></div>
<div class="sec"><div class="sec-lbl"><i class="ti ti-heart"></i> Oração</div><div class="prayer">${d.oracao}</div></div>`;
  
  updateTopButton();
}

function next(){if(cur<devs.length-1){cur++;stopAudio();render()}}
function prev(){if(cur>0){cur--;stopAudio();render()}}

document.getElementById('dmBtn').onclick=function(){
  dark=!dark;
  document.getElementById('app').classList.toggle('dm',dark);
  document.getElementById('dmIco').className=dark?'ti ti-sun':'ti ti-moon';
};

function stopAudio(){
  synth.cancel();audPlay=false;clearInterval(audItv);audProg=0;showAud=false;
  render();
}

function updateTopButton(){
    const ico = document.getElementById('topAudIco');
    const txt = document.getElementById('topAudTxt');
    if(showAud) {
        ico.className = 'ti ti-player-stop';
        txt.textContent = 'PARAR';
    } else {
        ico.className = 'ti ti-headphones';
        txt.textContent = 'OUVIR';
    }
}

function handleAudio(){
  if(!showAud){
    showAud=true;
    audPlay=true; // Já definimos como tocando antes de renderizar
    render();
    setTimeout(startRead,80);
    return;
  }
  stopAudio();
}

function togglePlay(){
  if(audPlay){synth.pause();audPlay=false;clearInterval(audItv);}
  else{if(synth.paused) synth.resume(); else startRead(); audPlay=true;}
  render();
}

function startRead(){
  const d=devs[cur];
  const txt=d.titulo+'. '+d.verso+'. Reflexão: '+d.reflexao+' Aplicação: '+d.aplicacao+' Oração: '+d.oracao;
  synth.cancel();
  const u=new SpeechSynthesisUtterance(txt);
  u.lang='pt-BR';u.rate=0.95;
  audMax=Math.max(30,Math.round(txt.length*0.07));audProg=0;
  audPlay=true;
  u.onend=()=>{stopAudio();};
  synth.speak(u);
  clearInterval(audItv);
  audItv=setInterval(()=>{if(audPlay && !synth.paused){audProg=Math.min(audProg+1,audMax);updateAud();}},1000);
}

function updateAud(){
  const f=document.getElementById('aFill');if(f)f.style.width=Math.round((audProg/audMax)*100)+'%';
  const t=document.getElementById('aTime');if(t)t.textContent=fmt(audProg)+' / '+fmt(audMax);
}

function doShare(){
  const d=devs[cur];
  const pageLink = window.location.href;
  const txt = '✨ *' + d.titulo + '*\n\n' +
              '_' + d.ref + '_\n' +
              '"' + d.verso + '"\n\n' +
              '*Reflexão:*\n' + d.reflexao + '\n\n' +
              '*Oração:*\n' + d.oracao + '\n\n' +
              '─────────────────\n' +
              '🔘 *LER COMPLETO E OUVIR ÁUDIO:*\n' + 
              '👇 CLIQUE NO LINK ABAIXO\n' +
              pageLink;

  window.location.href = 'whatsapp://send?text=' + encodeURIComponent(txt);
  setTimeout(() => {
    if(document.hasFocus()) window.open('https://api.whatsapp.com/send?text=' + encodeURIComponent(txt), '_blank');
  }, 500);
}

render();
</script>
